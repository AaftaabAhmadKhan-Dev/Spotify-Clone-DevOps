# Turn off alert manange to save memory usage
alertmanager:
 enabled: false

# Set Grafana login password
grafana:
 adminPassword: "admin"

# Trim prometheus so it fits on a small machine
prometheus:
 prometheusSpec:
  retention: 3h # only keep 3 hours of data, to save memory
  resources:
   requests:
    cpu: 100m
    memory: 300Mi
   limits:
    memory: 600Mi