name: CI - Build & Push Docker Image

# When the robot wakes up
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

# What the robot is allowed to touch
permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        #The free cloud computer to run on
        runs-on: ubuntu-latest

        steps:
            #1. Download your repo code onto the runner
            - name: Checkout code
              uses: actions/checkout@v4
            
            #2. Login to Github image storage GHCR(Github container registery)
            - name: Login to Github Container Registry
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            #3. Build the docker image and push it to storage
            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: ghcr.io/aaftaabahmadkhan-dev/spotify-clone:latest