name: CI - Build Scan & Push Docker Image

# When the robot wakes up
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

# What the robot is allowed to touch
permissions:
    contents: read
    packages: write

jobs:
    build-scan-push:
        #The free cloud computer to run on
        runs-on: ubuntu-latest

        env:
            IMAGE_NAME: ghcr.io/aaftaabahmadkhan-dev/spotify-clone:latest

        steps:
            #1. Download your repo code onto the runner
            - name: Checkout code
              uses: actions/checkout@v4
            
            #2. Login to Github image storage GHCR(Github container registery)
            - name: Login to Github Container Registry
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            #3. Build the docker image
            - name: Build Docker Image
              run: |
               docker build -t $IMAGE_NAME .
            # Scan Image with Trivy
            - name: Scan Docker Image
              uses: aquasecurity/trivy-action@v0.36.0
              with:
               image-ref: ${{ env.IMAGE_NAME }}
               format: table
               exit-code: 1
               ignore-unfixed: true
               severity: HIGH,CRITICAL
               trivyignores: .trivyignore

            # Push Image only if scan passes
            - name: Push Docker Image
              run:
               docker push $IMAGE_NAME


              